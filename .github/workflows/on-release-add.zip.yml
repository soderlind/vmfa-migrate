name: On Release, Build release zip

on:
  release:
    types: [published]

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build JS/CSS assets
        run: npm ci && npm run build

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Archive Release
        uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 #0.7.6
        with:
          type: 'zip'
          filename: 'vmfa-migrate.zip'
          exclusions: >-
            *.git* /*.github/* /*.vscode/* /*node_modules/* /*tests/* /*docs/*
            /src/js/* !/src/php/*
            composer.json composer.lock package.json package-lock.json
            phpunit.xml phpunit.xml.dist phpcs.xml vitest.config.js i18n-map.json
            .editorconfig .eslintignore .phpunit.result.cache .eslintrc.js .gitignore .gitattributes webpack.config.js
            *.log CHANGELOG.md README.md plan.md
            !readme.txt !build/* !languages/* !src/php/* !vendor/*

      - name: Verify Archive Contents
        run: |
          echo "Listing vmfa-migrate.zip entries:" 
          unzip -l vmfa-migrate.zip || { echo "Failed to list zip contents"; exit 1; }
          echo "Total files: $(unzip -l vmfa-migrate.zip | awk 'END{print $2}')"
          
          # Verify build assets are included
          if unzip -l vmfa-migrate.zip | grep -q "build/index.js"; then
            echo "✓ Build assets are included"
          else
            echo "✗ ERROR: build/index.js is missing from the release!"
            exit 1
          fi

          # Verify Action Scheduler is included (required dependency)
          if unzip -l vmfa-migrate.zip | grep -q "vendor/woocommerce/action-scheduler/action-scheduler.php"; then
            echo "✓ Action Scheduler is included (vendor/)"
          elif unzip -l vmfa-migrate.zip | grep -q "woocommerce/action-scheduler/action-scheduler.php"; then
            echo "✓ Action Scheduler is included (woocommerce/)"
          else
            echo "✗ ERROR: Action Scheduler is missing from the release!"
            exit 1
          fi

          # Verify Plugin Update Checker is included
          if unzip -l vmfa-migrate.zip | grep -q "vendor/yahnis-elsts/plugin-update-checker"; then
            echo "✓ Plugin Update Checker is included"
          else
            echo "✗ ERROR: Plugin Update Checker is missing from the release!"
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda #v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: vmfa-migrate.zip
          tag_name: ${{ github.event.release.tag_name }}
